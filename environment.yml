name: pcr_diagnostic
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  
  # Core Scientific Computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  
  # Visualization
  - matplotlib>=3.4.0
  - seaborn>=0.11.0
  
  # Machine Learning (conda packages)
  - scikit-learn>=1.0.0
  
  # Statistical Analysis
  - statsmodels>=0.13.0
  
  # Development Tools
  - ipykernel
  - jupyterlab>=3.0.0
  
  # Pip packages
  - pip:
    # Visualization
    - plotly>=5.0.0
    
    # Machine Learning
    - xgboost>=1.5.0
    - lightgbm>=3.3.0
    
    # Statistical Analysis
    - pingouin>=0.5.0
    
    # Data Processing
    - openpyxl>=3.0.0
    - xlrd>=2.0.0
    
    # Report Generation
    - jinja2>=3.0.0
    - reportlab>=3.6.0
    - fpdf>=1.7.2
    
    # Utility
    - tqdm>=4.62.0
    - pyyaml>=6.0
    - joblib>=1.1.0
    
    # Testing
    - pytest>=7.0.0
    - pytest-cov>=3.0.0
    
    # Jupyter widgets
    - ipywidgets>=7.6.0
